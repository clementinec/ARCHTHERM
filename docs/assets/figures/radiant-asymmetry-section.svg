  <rect x="130" y="168" width="95" height="390" fill="#a8d7f0" opacity="0.45" stroke="#1f6f8b" stroke-width="3"/>
  <rect x="130" y="558" width="920" height="42" fill="#ddd7cb" stroke="#15171a" stroke-width="3"/>
  <rect x="1050" y="168" width="100" height="432" fill="#f0eadf" stroke="#15171a" stroke-width="3"/>
  <line x1="186" y1="185" x2="320" y2="458" stroke="#b34838" stroke-width="5" opacity="0.75"/>
  <line x1="186" y1="245" x2="363" y2="458" stroke="#b34838" stroke-width="5" opacity="0.75"/>
  <line x1="186" y1="315" x2="412" y2="458" stroke="#b34838" stroke-width="5" opacity="0.75"/>
  <circle cx="392" cy="405" r="36" fill="#f5e7e3" stroke="#15171a" stroke-width="3"/>
  <rect x="365" y="440" width="54" height="82" fill="#f5e7e3" stroke="#15171a" stroke-width="3"/>
  <line x1="365" y1="470" x2="318" y2="520" stroke="#15171a" stroke-width="6" stroke-linecap="round"/>
  <line x1="419" y1="470" x2="470" y2="520" stroke="#15171a" stroke-width="6" stroke-linecap="round"/>
  <circle cx="760" cy="405" r="36" fill="#e8f2f6" stroke="#15171a" stroke-width="3"/>
  <rect x="733" y="440" width="54" height="82" fill="#e8f2f6" stroke="#15171a" stroke-width="3"/>
  <line x1="733" y1="470" x2="686" y2="520" stroke="#15171a" stroke-width="6" stroke-linecap="round"/>
  <line x1="787" y1="470" x2="838" y2="520" stroke="#15171a" stroke-width="6" stroke-linecap="round"/>
  <text x="300" y="638" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#b34838">Position A: high radiant load</text>
  <text x="650" y="638" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#1f6f8b">Position B: lower radiant exposure</text>
  <rect x="875" y="235" width="230" height="145" fill="#fffdf7" stroke="#d8d5cd" stroke-width="2"/>
  <text x="900" y="274" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#15171a">A2 comparison</text>
  <text x="900" y="314" font-family="Arial, sans-serif" font-size="17" fill="#606773">Ta may be similar</text>
  <text x="900" y="346" font-family="Arial, sans-serif" font-size="17" fill="#606773">MRT / surface view differs</text>
  <text x="900" y="378" font-family="Arial, sans-serif" font-size="17" fill="#606773">design action follows</text>
</svg>

