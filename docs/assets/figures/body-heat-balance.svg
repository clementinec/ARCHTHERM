<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-label="Human body heat balance diagram">
  <rect width="1280" height="720" fill="#fbfaf7"/>
  <text x="70" y="74" font-family="Arial, sans-serif" font-size="34" font-weight="700" fill="#15171a">Human body heat balance as an architectural reading</text>
  <text x="72" y="112" font-family="Arial, sans-serif" font-size="19" fill="#606773">The body exchanges heat with air, surfaces, moisture, activity, clothing, and time.</text>
  <rect x="90" y="170" width="1100" height="430" rx="0" fill="#ffffff" stroke="#d8d5cd" stroke-width="2"/>
  <circle cx="640" cy="355" r="70" fill="#f5e7e3" stroke="#15171a" stroke-width="3"/>
  <rect x="600" y="425" width="80" height="118" fill="#f5e7e3" stroke="#15171a" stroke-width="3"/>
  <line x1="600" y1="464" x2="520" y2="540" stroke="#15171a" stroke-width="8" stroke-linecap="round"/>
  <line x1="680" y1="464" x2="760" y2="540" stroke="#15171a" stroke-width="8" stroke-linecap="round"/>
  <line x1="615" y1="543" x2="570" y2="625" stroke="#15171a" stroke-width="8" stroke-linecap="round"/>
  <line x1="665" y1="543" x2="710" y2="625" stroke="#15171a" stroke-width="8" stroke-linecap="round"/>
  <text x="606" y="360" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#15171a">BODY</text>
  <path d="M640 255 C600 225 600 190 640 170 C680 190 680 225 640 255" fill="#f3edda" stroke="#8a6f22" stroke-width="3"/>
  <text x="574" y="153" font-family="Arial, sans-serif" font-size="21" font-weight="700" fill="#8a6f22">metabolism</text>
  <text x="558" y="680" font-family="Arial, sans-serif" font-size="21" font-weight="700" fill="#4c4a80">clothing + activity</text>
  <path d="M348 250 C430 265 486 300 558 342" fill="none" stroke="#1f6f8b" stroke-width="7" marker-end="url(#arrowBlue)"/>
  <text x="146" y="246" font-family="Arial, sans-serif" font-size="25" font-weight="700" fill="#1f6f8b">Convection</text>
  <text x="146" y="278" font-family="Arial, sans-serif" font-size="18" fill="#606773">air speed and Ta change</text>
  <path d="M932 245 C855 270 796 307 724 342" fill="none" stroke="#b34838" stroke-width="7" marker-end="url(#arrowRed)"/>
  <text x="940" y="246" font-family="Arial, sans-serif" font-size="25" font-weight="700" fill="#b34838">Radiation</text>
  <text x="940" y="278" font-family="Arial, sans-serif" font-size="18" fill="#606773">surface temperature and sun</text>
  <path d="M365 520 C438 495 492 472 583 438" fill="none" stroke="#3d6b52" stroke-width="7" marker-end="url(#arrowGreen)"/>
  <text x="145" y="518" font-family="Arial, sans-serif" font-size="25" font-weight="700" fill="#3d6b52">Evaporation</text>
  <text x="145" y="550" font-family="Arial, sans-serif" font-size="18" fill="#606773">RH changes sweat effectiveness</text>
  <path d="M925 520 C850 497 793 474 695 440" fill="none" stroke="#8a6f22" stroke-width="7" marker-end="url(#arrowGold)"/>
  <text x="940" y="518" font-family="Arial, sans-serif" font-size="25" font-weight="700" fill="#8a6f22">Conduction</text>
  <text x="940" y="550" font-family="Arial, sans-serif" font-size="18" fill="#606773">contact with seat, slab, ground</text>
  <defs>
    <marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#1f6f8b"/></marker>
    <marker id="arrowRed" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#b34838"/></marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#3d6b52"/></marker>
    <marker id="arrowGold" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#8a6f22"/></marker>
  </defs>
</svg>

