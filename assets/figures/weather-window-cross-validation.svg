<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-label="Weather window roll-forward and cross-validation analogy">
  <rect width="1280" height="720" fill="#fbfaf7"/>
  <text x="70" y="76" font-family="Arial, sans-serif" font-size="34" font-weight="700" fill="#15171a">Roll-forward validation asks whether the action survives another window</text>
  <text x="72" y="114" font-family="Arial, sans-serif" font-size="19" fill="#606773">The analogy to cross-validation is useful, but the architectural question remains: does the design conclusion still hold?</text>
  <line x1="130" y1="250" x2="1130" y2="250" stroke="#15171a" stroke-width="4"/>
  <line x1="130" y1="410" x2="1130" y2="410" stroke="#15171a" stroke-width="4"/>
  <line x1="130" y1="570" x2="1130" y2="570" stroke="#15171a" stroke-width="4"/>
  <g font-family="Arial, sans-serif" font-size="18" font-weight="700">
    <rect x="210" y="205" width="220" height="90" fill="#f3edda" stroke="#8a6f22" stroke-width="3"/>
    <text x="242" y="258" fill="#8a6f22">typical week</text>
    <rect x="500" y="365" width="220" height="90" fill="#f5e7e3" stroke="#b34838" stroke-width="3"/>
    <text x="532" y="418" fill="#b34838">heatwave week</text>
    <rect x="780" y="525" width="240" height="90" fill="#e7f0e8" stroke="#3d6b52" stroke-width="3"/>
    <text x="812" y="578" fill="#3d6b52">future window</text>
  </g>
  <text x="132" y="203" font-family="Arial, sans-serif" font-size="21" font-weight="700" fill="#15171a">fit / decide</text>
  <text x="132" y="363" font-family="Arial, sans-serif" font-size="21" font-weight="700" fill="#15171a">test / stress</text>
  <text x="132" y="523" font-family="Arial, sans-serif" font-size="21" font-weight="700" fill="#15171a">roll forward</text>
  <rect x="820" y="170" width="330" height="210" fill="#ffffff" stroke="#d8d5cd" stroke-width="2"/>
  <text x="850" y="220" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#15171a">Outcome labels</text>
  <text x="850" y="265" font-family="Arial, sans-serif" font-size="18" fill="#15171a">robust</text>
  <text x="850" y="305" font-family="Arial, sans-serif" font-size="18" fill="#15171a">weakened</text>
  <text x="850" y="345" font-family="Arial, sans-serif" font-size="18" fill="#15171a">censored / unsupported</text>
</svg>

