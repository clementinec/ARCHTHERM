<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-label="Thermal lag and degree hours">
  <rect width="1280" height="720" fill="#fbfaf7"/>
  <text x="70" y="76" font-family="Arial, sans-serif" font-size="34" font-weight="700" fill="#15171a">Temporal build-up: peak is not the whole failure</text>
  <text x="72" y="114" font-family="Arial, sans-serif" font-size="19" fill="#606773">A3 asks when heat accumulates, lags, and remains above a threshold.</text>
  <line x1="150" y1="575" x2="1120" y2="575" stroke="#15171a" stroke-width="3"/>
  <line x1="150" y1="160" x2="150" y2="575" stroke="#15171a" stroke-width="3"/>
  <line x1="150" y1="300" x2="1120" y2="300" stroke="#b34838" stroke-width="3" stroke-dasharray="12 10"/>
  <text x="175" y="292" font-family="Arial, sans-serif" font-size="18" fill="#b34838">threshold</text>
  <path d="M150 500 C250 470 310 250 410 225 C520 200 580 500 680 520 C790 540 850 360 935 285 C1020 210 1060 270 1120 330" fill="none" stroke="#a9a9a9" stroke-width="5"/>
  <path d="M150 520 C260 512 340 442 440 360 C545 275 620 245 715 260 C825 278 910 352 990 405 C1045 440 1080 460 1120 470" fill="none" stroke="#8a6f22" stroke-width="7"/>
  <path d="M385 300 C470 230 610 240 715 260 C825 278 910 352 990 405 L990 300 Z" fill="#f3edda" opacity="0.75" stroke="none"/>
  <text x="840" y="235" font-family="Arial, sans-serif" font-size="21" font-weight="700" fill="#8a6f22">degree-hours</text>
  <text x="840" y="265" font-family="Arial, sans-serif" font-size="17" fill="#606773">area above the threshold</text>
  <text x="290" y="627" font-family="Arial, sans-serif" font-size="18" fill="#606773">morning</text>
  <text x="590" y="627" font-family="Arial, sans-serif" font-size="18" fill="#606773">afternoon</text>
  <text x="920" y="627" font-family="Arial, sans-serif" font-size="18" fill="#606773">night</text>
  <text x="106" y="167" font-family="Arial, sans-serif" font-size="18" fill="#606773">hotter</text>
  <text x="103" y="570" font-family="Arial, sans-serif" font-size="18" fill="#606773">cooler</text>
  <text x="890" y="502" font-family="Arial, sans-serif" font-size="19" fill="#a9a9a9">outdoor or solar driver</text>
  <text x="386" y="402" font-family="Arial, sans-serif" font-size="19" fill="#8a6f22">surface / zone response with lag</text>
</svg>

