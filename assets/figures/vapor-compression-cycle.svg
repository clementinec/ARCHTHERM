<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 650" role="img" aria-label="Simplified vapor compression cooling cycle">
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#1f2937"/>
    </marker>
    <style>
      .bg{fill:#f7f4ed}
      .box{fill:#fff;stroke:#2f3a45;stroke-width:3;rx:18}
      .cold{fill:#d9eef8;stroke:#1d6e8c;stroke-width:3;rx:18}
      .hot{fill:#ffe2d1;stroke:#b6532b;stroke-width:3;rx:18}
      .line{fill:none;stroke:#1f2937;stroke-width:6;marker-end:url(#arrow)}
      .thin{fill:none;stroke:#64748b;stroke-width:3;stroke-dasharray:10 10}
      .title{font:700 34px Inter,Arial,sans-serif;fill:#1f2937}
      .label{font:700 26px Inter,Arial,sans-serif;fill:#1f2937}
      .small{font:500 22px Inter,Arial,sans-serif;fill:#475569}
      .note{font:600 20px Inter,Arial,sans-serif;fill:#0f766e}
    </style>
  </defs>
  <rect class="bg" width="1200" height="650"/>
  <text class="title" x="70" y="70">Air-Based Cooling: A Useful System, Not A Whole Thermal Answer</text>

  <rect class="cold" x="90" y="190" width="240" height="140"/>
  <text class="label" x="130" y="245">Evaporator</text>
  <text class="small" x="130" y="282">absorbs heat</text>
  <text class="small" x="130" y="310">from indoor air</text>

  <rect class="box" x="480" y="190" width="240" height="140"/>
  <text class="label" x="515" y="245">Compressor</text>
  <text class="small" x="515" y="282">raises pressure</text>
  <text class="small" x="515" y="310">and temperature</text>

  <rect class="hot" x="870" y="190" width="240" height="140"/>
  <text class="label" x="905" y="245">Condenser</text>
  <text class="small" x="905" y="282">rejects heat</text>
  <text class="small" x="905" y="310">to outdoors</text>

  <rect class="box" x="480" y="430" width="240" height="110"/>
  <text class="label" x="522" y="480">Expansion</text>
  <text class="small" x="522" y="513">pressure drop</text>

  <path class="line" d="M330 260 H480"/>
  <path class="line" d="M720 260 H870"/>
  <path class="line" d="M990 330 V485 H720"/>
  <path class="line" d="M480 485 H210 V330"/>

  <path class="thin" d="M90 390 H330"/>
  <text class="note" x="96" y="378">indoor side: air state still varies by position</text>

  <path class="thin" d="M870 390 H1110"/>
  <text class="small" x="880" y="378">outdoor heat rejection</text>

  <text class="small" x="76" y="586">Architectural question: does conditioning the air also solve stagnant corners, drafts,</text>
  <text class="small" x="76" y="616">radiant exposure, and humidity control?</text>
</svg>
