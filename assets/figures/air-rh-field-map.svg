<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-label="Spatial air temperature and humidity field map">
  <rect width="1280" height="720" fill="#fbfaf7"/>
  <text x="70" y="76" font-family="Arial, sans-serif" font-size="34" font-weight="700" fill="#15171a">A1 turns room temperature into a sampled field</text>
  <text x="72" y="114" font-family="Arial, sans-serif" font-size="19" fill="#606773">Same room. Different position. Different air and humidity claim.</text>
  <rect x="110" y="170" width="760" height="420" fill="#ffffff" stroke="#15171a" stroke-width="4"/>
  <rect x="110" y="170" width="150" height="420" fill="#f5e7e3" opacity="0.85"/>
  <rect x="720" y="170" width="150" height="420" fill="#e8f2f6" opacity="0.9"/>
  <line x1="260" y1="170" x2="260" y2="590" stroke="#d8d5cd" stroke-width="2"/>
  <line x1="720" y1="170" x2="720" y2="590" stroke="#d8d5cd" stroke-width="2"/>
  <rect x="128" y="205" width="92" height="350" fill="none" stroke="#b34838" stroke-width="3"/>
  <text x="135" y="190" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#b34838">facade edge</text>
  <text x="728" y="190" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#1f6f8b">core / shaded</text>
  <g font-family="Arial, sans-serif" font-size="18" font-weight="700">
    <circle cx="180" cy="270" r="18" fill="#b34838"/><text x="208" y="277" fill="#15171a">29.2 C / 72% RH</text>
    <circle cx="430" cy="280" r="18" fill="#8a6f22"/><text x="458" y="287" fill="#15171a">27.8 C / 68% RH</text>
    <circle cx="650" cy="390" r="18" fill="#3d6b52"/><text x="678" y="397" fill="#15171a">26.9 C / 66% RH</text>
    <circle cx="785" cy="515" r="18" fill="#1f6f8b"/><text x="813" y="522" fill="#15171a">26.3 C / 64% RH</text>
  </g>
  <line x1="180" y1="270" x2="785" y2="515" stroke="#15171a" stroke-width="2" stroke-dasharray="8 9"/>
  <rect x="930" y="190" width="260" height="330" fill="#ffffff" stroke="#d8d5cd" stroke-width="2"/>
  <text x="960" y="235" font-family="Arial, sans-serif" font-size="23" font-weight="700" fill="#15171a">Claim strength</text>
  <text x="960" y="285" font-family="Arial, sans-serif" font-size="18" fill="#606773">depends on:</text>
  <text x="960" y="330" font-family="Arial, sans-serif" font-size="18" fill="#15171a">where measured</text>
  <text x="960" y="372" font-family="Arial, sans-serif" font-size="18" fill="#15171a">when measured</text>
  <text x="960" y="414" font-family="Arial, sans-serif" font-size="18" fill="#15171a">sensor height</text>
  <text x="960" y="456" font-family="Arial, sans-serif" font-size="18" fill="#15171a">missing variables</text>
  <text x="960" y="498" font-family="Arial, sans-serif" font-size="18" fill="#15171a">what was not sampled</text>
  <text x="114" y="648" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#15171a">A1 output:</text>
  <text x="235" y="648" font-family="Arial, sans-serif" font-size="22" fill="#606773">plan/section + Ta/RH points + uncertainty note + defensible claim</text>
</svg>

