<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-label="Roll-forward validation note structure">
  <rect width="1280" height="720" fill="#fbfaf7"/>
  <text x="70" y="76" font-family="Arial, sans-serif" font-size="34" font-weight="700" fill="#15171a">A4 roll-forward validation note</text>
  <text x="72" y="114" font-family="Arial, sans-serif" font-size="19" fill="#606773">Required: one changed stress assumption. Optional: multiple windows for distinction-level evidence.</text>
  <g font-family="Arial, sans-serif">
    <rect x="100" y="190" width="255" height="320" fill="#ffffff" stroke="#d8d5cd" stroke-width="2"/>
    <text x="130" y="235" font-size="22" font-weight="700" fill="#15171a">1 Baseline claim</text>
    <text x="130" y="285" font-size="17" fill="#606773">condition</text>
    <text x="130" y="325" font-size="17" fill="#606773">threshold</text>
    <text x="130" y="365" font-size="17" fill="#606773">design action</text>
    <rect x="395" y="190" width="255" height="320" fill="#f3edda" stroke="#8a6f22" stroke-width="3"/>
    <text x="425" y="235" font-size="22" font-weight="700" fill="#8a6f22">2 Changed window</text>
    <text x="425" y="285" font-size="17" fill="#15171a">hotter period</text>
    <text x="425" y="325" font-size="17" fill="#15171a">future weather</text>
    <text x="425" y="365" font-size="17" fill="#15171a">longer duration</text>
    <text x="425" y="405" font-size="17" fill="#15171a">changed occupancy</text>
    <rect x="690" y="190" width="255" height="320" fill="#e7f0e8" stroke="#3d6b52" stroke-width="3"/>
    <text x="720" y="235" font-size="22" font-weight="700" fill="#3d6b52">3 Outcome label</text>
    <text x="720" y="285" font-size="17" fill="#15171a">robust</text>
    <text x="720" y="325" font-size="17" fill="#15171a">weakened</text>
    <text x="720" y="365" font-size="17" fill="#15171a">censored</text>
    <text x="720" y="405" font-size="17" fill="#15171a">unsupported</text>
    <rect x="985" y="190" width="195" height="320" fill="#ebe9f4" stroke="#4c4a80" stroke-width="3"/>
    <text x="1015" y="235" font-size="22" font-weight="700" fill="#4c4a80">4 Design limit</text>
    <text x="1015" y="285" font-size="17" fill="#15171a">what holds</text>
    <text x="1015" y="325" font-size="17" fill="#15171a">what fails</text>
    <text x="1015" y="365" font-size="17" fill="#15171a">what next</text>
  </g>
  <text x="104" y="610" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#15171a">The claim is not: this design is future-proof.</text>
  <text x="104" y="650" font-family="Arial, sans-serif" font-size="22" fill="#606773">The claim is: here is how this action behaves under one changed stress assumption.</text>
</svg>

